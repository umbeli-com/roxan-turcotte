name: Déploiement GitHub Pages (site public)

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances du client uniquement
        working-directory: client
        run: npm install --no-audit --no-fund

      - name: Construire le site statique (SSG)
        working-directory: client
        env:
          PUBLIC_SITE_URL: https://turcotte.umbeli.com
          PAGES_CNAME: turcotte.umbeli.com
          VITE_API_URL: /api
          VITE_STUB_FORMS: 'true'
        run: npm run build

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Téléverser l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploiement.outputs.page_url }}
    steps:
      - name: Déployer sur GitHub Pages
        id: deploiement
        uses: actions/deploy-pages@v4
