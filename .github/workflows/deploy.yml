name: Deploy Roxan Turcotte

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate secrets
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          for s in SERVER_HOST SERVER_USER SERVER_SSH_KEY; do
            if [ -z "${!s:-}" ]; then
              echo "::error::Missing required secret: $s"
              exit 1
            fi
          done
          [ -z "${SERVER_PORT:-}" ] && echo "SERVER_PORT=22" >> "$GITHUB_ENV" || true

      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GITHUB_TOKEN
          command_timeout: 30m
          script: |
            set -euo pipefail

            APP_SLUG="roxan-turcotte"
            ENV="prod"
            BRANCH="${{ github.ref_name }}"
            PROJECT_DIR="/home/umbeservices/${APP_SLUG}/${ENV}"
            COMPOSE_FILE="docker-compose.${ENV}.yml"
            COMPOSE_PROJECT="${APP_SLUG}-${ENV}"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            AUTH_REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

            echo "=== Deploying ${APP_SLUG} branch '${BRANCH}' to '${ENV}' ==="

            mkdir -p "$PROJECT_DIR"

            ENV_FILE="$PROJECT_DIR/.env"
            ENV_BACKUP="/tmp/${APP_SLUG}-${ENV}.env"
            if [ -f "$ENV_FILE" ]; then cp -f "$ENV_FILE" "$ENV_BACKUP"; fi

            git config --global --add safe.directory "$PROJECT_DIR"

            if [ -d "$PROJECT_DIR/.git" ]; then
              cd "$PROJECT_DIR"
              git remote set-url origin "$REPO_URL"
              git fetch "$AUTH_REPO_URL" "$BRANCH"
              git reset --hard FETCH_HEAD
              git remote set-url --push origin "$REPO_URL"
            else
              TMP_DIR=$(mktemp -d)
              git clone -b "$BRANCH" "$AUTH_REPO_URL" "$TMP_DIR"
              tar --exclude='.env' -C "$TMP_DIR" -cf - . | tar -C "$PROJECT_DIR" -xf -
              rm -rf "$TMP_DIR"
              cd "$PROJECT_DIR"
              git remote set-url origin "$REPO_URL"
              git remote set-url --push origin "$REPO_URL"
            fi

            if [ -f "$ENV_BACKUP" ]; then cp -f "$ENV_BACKUP" "$ENV_FILE"; fi

            git remote set-url origin "$REPO_URL"
            git remote set-url --push origin "$REPO_URL"

            if [ ! -f "$COMPOSE_FILE" ]; then
              echo "::error::Missing compose file '$COMPOSE_FILE'"
              exit 1
            fi

            if [ ! -f "$ENV_FILE" ]; then
              echo "::error::Missing .env at $ENV_FILE. Create it with SESSION_SECRET, MAIL_USER, MAIL_PASSWORD, MAIL_NOTIF_INTERNAL_TO."
              exit 1
            fi

            docker network inspect app_network >/dev/null 2>&1 || docker network create app_network >/dev/null

            docker compose -p "$COMPOSE_PROJECT" -f "$COMPOSE_FILE" build

            docker rm -f roxan-turcotte-backend roxan-turcotte-frontend 2>/dev/null || true
            docker compose -p "$COMPOSE_PROJECT" -f "$COMPOSE_FILE" up -d --force-recreate --remove-orphans

            docker image prune -f || true

            sleep 5

            echo "=== Running containers ==="
            docker ps --filter "label=com.docker.compose.project=${COMPOSE_PROJECT}"

            echo "=== Backend logs ==="
            docker logs roxan-turcotte-backend --tail 30 2>&1 || true
