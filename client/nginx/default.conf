upstream roxan_backend {
  server roxan-turcotte-backend:3010;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 25m;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://roxan_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri $uri/ /index.html;
  }

  location = /health {
    access_log off;
    default_type text/plain;
    return 200 "ok";
  }

  # Tombstone service worker. If a previous build registered a service worker
  # (vite-plugin-pwa or similar), browsers keep fetching /sw.js to update it;
  # without this block the SPA fallback returns index.html as JS, which the
  # browser tries to JSON.parse, surfacing "Unexpected token '<'" errors.
  location = /sw.js {
    default_type application/javascript;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    return 200 "self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(self.registration.unregister().then(()=>self.clients.matchAll()).then(c=>c.forEach(w=>w.navigate&&w.navigate(w.url)))));";
  }
  location = /service-worker.js { return 404; }
  location = /workbox-config.js { return 404; }
  location = /registerSW.js { return 404; }

  # Manifest / icons fall back to a 404 instead of the SPA shell so the
  # browser does not try to JSON.parse an HTML document.
  location = /manifest.json { return 404; }
  location = /manifest.webmanifest { return 404; }
  location = /site.webmanifest { return 404; }
}
